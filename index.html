<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-spacer"></div>
            <h1>로또 번호 추첨기</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">
                <span id="theme-icon">🌙</span>
            </button>
        </header>
        
        <button id="generate-btn">번호 추천 받기</button>
        
        <div id="numbers-container">
            <p class="placeholder">아직 추천된 번호가 없어요. 👆 <br>버튼을 눌러 번호를 받아보세요!</p>
        </div>

        <section class="contact-section">
            <hr class="section-divider">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mkokebok" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">성함</label>
                    <input type="text" id="name" name="name" placeholder="성함을 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="이메일 주소를 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의하기</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
